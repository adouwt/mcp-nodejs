name: login-register-mcp
description: MCP服务 - 通过用户名、密码和产品名称获取登录token，支持token校验和多产品隔离
author: hrtps.com
repository: https://github.com/hrtps/login-register-mcp
npm: login-register-mcp
license: MIT
version: 1.0.0
categories:
  - authentication
  - security
  - user-management
  - jwt
keywords:
  - mcp
  - login
  - register
  - token
  - jwt
  - authentication
  - multi-tenant
features:
  - 用户登录/注册功能
  - JWT token 生成和校验
  - 多产品隔离支持
  - 密码 SHA256 加密
  - 完整操作日志
  - 支持作为 MCP 服务或 Node.js 库使用
tools:
  - name: get_login_token
    description: 通过用户名、密码和产品名称获取登录token，如果用户不存在则自动创建
    parameters:
      - name: username
        type: string
        required: true
        description: 用户名
      - name: password
        type: string
        required: true
        description: 密码
      - name: product
        type: string
        required: true
        description: 产品/业务名称
  - name: verify_token
    description: 校验 JWT token 的有效性并返回用户信息
    parameters:
      - name: token
        type: string
        required: true
        description: JWT token
installation:
  npm: npm install login-register-mcp
  global: npm install -g login-register-mcp
usage:
  mcp_config: |
    {
      "mcpServers": {
        "login-register": {
          "command": "npx",
          "args": ["login-register-mcp"]
        }
      }
    }
  nodejs: |
    import { login, verifyToken } from 'login-register-mcp/client';
    const result = await login('username', 'password', 'myapp');
    const verification = await verifyToken(result.token);
